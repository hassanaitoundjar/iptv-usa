site:
  name: IPTV Smarters PRO
  site: 'https://iptv-usa-omega.vercel.app/'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: IPTV Smarters PRO
    template: '%s — IPTV Smarters PRO'
  description: 'Get the #1 IPTV Smarters Pro subscription with 20,000+ live channels and 100,000+ VOD movies in 4K HD. Works on Firestick, Smart TV, Android & iPhone. Free 24h trial. From $12/month.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: IPTV Smarters PRO
    images:
      - url: 'https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?w=1200&q=80'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@streamproiptv'
    site: '@streamproiptv'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
